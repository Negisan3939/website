<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fastminer - 採掘鯖</title>

  <style>
    body {
      margin: 0;
      font-family: "Arial", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      text-align: center;
    }

    header {
      padding: 80px 20px 40px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .subtitle {
      font-size: 18px;
      opacity: 0.9;
    }

    .card {
      max-width: 800px;
      margin: 40px auto;
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .highlight {
      color: #fbbf24;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: #5865F2;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #4752c4;
      transform: scale(1.05);
    }

    footer {
      margin: 60px 0 30px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <header>
    <h1>⛏️ Fastminer</h1>
    <p class="subtitle">あの採掘鯖が、再び帰ってきた。</p>
  </header>

  <div class="card">
    <p>
      以前の公開では、わずか1か月で<span class="highlight">900人突破</span>。<br>
      再公開時には1か月で<span class="highlight">1300人達成</span>。
    </p>

    <p>
      今回は数か月ぶりの復活。<br>
      プレイヤーデータはリセットされていますが、全員が同じスタートラインです。
    </p>

    <p>
      採掘・育成・強化を最初から楽しみながら、<br>
      一緒にサーバーを盛り上げていきましょう！
    </p>

    <a class="btn" href="https://discord.gg/QgCVH6AkpY" target="_blank">
      Discordに参加する
    </a>
  </div>

  <footer>
    © Fastminer Community
  </footer>

</body>
</html>
